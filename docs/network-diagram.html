<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>goose.local — Network Diagram</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@700;800&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--muted:#7d8590}
  body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;height:100vh;overflow:hidden;display:flex;flex-direction:column}
  header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;gap:8px}
  .header-title{font-family:'Syne',sans-serif;font-weight:800;font-size:.95rem}
  .header-title span{color:var(--muted)}
  .controls{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
  .controls-label{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-right:2px}
  .toggle-btn{display:flex;align-items:center;gap:5px;padding:3px 9px;border-radius:5px;border:1px solid var(--border);background:var(--bg);color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:.65rem;cursor:pointer;transition:all .15s;user-select:none}
  .toggle-btn .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .toggle-btn.active{border-color:currentColor;color:var(--text);background:rgba(255,255,255,.05)}
  .toggle-btn:hover{background:rgba(255,255,255,.07)}
  .canvas-wrap{flex:1;overflow:hidden;position:relative}
  svg{width:100%;height:100%;display:block;cursor:grab}
  svg.dragging{cursor:grabbing}
  .node-rect{filter:drop-shadow(0 4px 12px rgba(0,0,0,.5))}
  .node-group:hover .node-rect{filter:drop-shadow(0 6px 20px rgba(0,0,0,.7)) brightness(1.15)}
  .node-label{font-family:'JetBrains Mono',monospace;fill:#fff;text-anchor:middle;dominant-baseline:middle;pointer-events:none}
  .node-name{font-size:11px;font-weight:700}
  .node-sub{font-size:9px;opacity:.75}
  .edge{fill:none;stroke-linecap:square;stroke-linejoin:miter}
  .edge.hidden,.elabel.hidden{opacity:0!important;pointer-events:none}
  .edge-network{stroke:#888;stroke-width:1.8}
  .edge-ad{stroke:#9b59b6;stroke-width:1.5;stroke-dasharray:6 3}
  .edge-mgmt{stroke:#27ae60;stroke-width:1.5;stroke-dasharray:6 3}
  .edge-ansible{stroke:#e67e22;stroke-width:1.5;stroke-dasharray:5 3}
  .edge-dhcp{stroke:#e91e8c;stroke-width:1.5;stroke-dasharray:5 3}
  .edge-rdp{stroke:#79c0ff;stroke-width:1.5;stroke-dasharray:4 4}
  .edge-dfs{stroke:#2e86c1;stroke-width:1.5;stroke-dasharray:6 3}
  .edge-profiles{stroke:#58a6ff;stroke-width:1.5;stroke-dasharray:4 6}
  .elabel{font-family:'JetBrains Mono',monospace;font-size:8px;fill:var(--muted);text-anchor:middle;pointer-events:none}
  .zoom-controls{position:absolute;bottom:14px;right:14px;display:flex;flex-direction:column;gap:4px}
  .zoom-btn{width:30px;height:30px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:6px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center}
  .zoom-btn:hover{background:var(--border)}
  .legend{position:absolute;bottom:14px;left:14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:.63rem;line-height:1.9}
  .legend-title{font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:2px}
  .legend-row{display:flex;align-items:center;gap:6px;color:var(--muted)}
  .legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .legend-note{font-size:.58rem;color:var(--muted);margin-top:6px;border-top:1px solid var(--border);padding-top:6px;max-width:150px;line-height:1.5}
  /* Node isolation dimming */
  .edge.dimmed{opacity:.07!important}
  .node-group.dimmed .node-rect{opacity:.25}
  .node-group.dimmed text{opacity:.25}
  /* Tooltip */
  #tip{position:fixed;pointer-events:none;background:#1f2937;border:1px solid #374151;color:#e6edf3;font-family:'JetBrains Mono',monospace;font-size:.68rem;padding:6px 10px;border-radius:6px;max-width:320px;line-height:1.5;box-shadow:0 4px 16px rgba(0,0,0,.6);display:none;z-index:100}
  .node-group{cursor:pointer}
</style>
</head>
<body>
<header>
  <div class="header-title">🦆 goose.local <span>— Network Diagram</span></div>
  <div class="controls">
    <span class="controls-label">Layers:</span>
    <button class="toggle-btn active" data-layer="network"  style="color:#888"><div class="dot" style="background:#888"></div>Network</button>
    <button class="toggle-btn active" data-layer="ad"       style="color:#9b59b6"><div class="dot" style="background:#9b59b6"></div>AD Auth</button>
    <button class="toggle-btn active" data-layer="mgmt"     style="color:#27ae60"><div class="dot" style="background:#27ae60"></div>MGMT Admin</button>
    <button class="toggle-btn active" data-layer="ansible"  style="color:#e67e22"><div class="dot" style="background:#e67e22"></div>Ansible</button>
    <button class="toggle-btn active" data-layer="dhcp"     style="color:#e91e8c"><div class="dot" style="background:#e91e8c"></div>DHCP</button>
    <button class="toggle-btn active" data-layer="rdp"      style="color:#79c0ff"><div class="dot" style="background:#79c0ff"></div>RDP</button>
    <button class="toggle-btn active" data-layer="dfs"      style="color:#2e86c1"><div class="dot" style="background:#2e86c1"></div>DFS Repl</button>
    <button class="toggle-btn active" data-layer="profiles" style="color:#58a6ff"><div class="dot" style="background:#58a6ff"></div>DFS Profiles</button>
  </div>
</header>
<div class="canvas-wrap">

<!--
  ═══════════════════════════════════════════════════════════════
  COORDINATE SYSTEM  viewBox="0 0 2600 1200"

  NODE TABLE  (cx, cy, half-width=130, half-height=40)
  ┌──────────┬──────┬──────┬──────────────────────────────────┐
  │ Name     │  cx  │  cy  │  bbox: L  R  T  B               │
  ├──────────┼──────┼──────┼──────────────────────────────────┤
  │ WAN      │ 1300 │  100 │  1200 1400  72 128  (w200,h56)  │
  │ FW1      │ 1300 │  260 │  1150 1450 220 300  (w300,h80)  │
  │ DC1      │  800 │  460 │   670  930 420 500  (w260,h80)  │
  │ DC2      │ 1800 │  460 │  1670 1930 420 500  (w260,h80)  │
  │ MGMT01   │  200 │  700 │    70  330 660 740  (w260,h80)  │
  │ DHCP01   │  570 │  700 │   440  700 660 740  (w260,h80)  │
  │ MGMT02   │  940 │  700 │   810 1070 660 740  (w260,h80)  │
  │ DOCKER   │ 1300 │  700 │  1170 1430 660 740  (w260,h80)  │
  │ UTIL     │ 1660 │  700 │  1530 1790 660 740  (w260,h80)  │
  │ DFS01    │ 2020 │  700 │  1890 2150 660 740  (w260,h80)  │
  │ DFS02    │ 2400 │  700 │  2270 2530 660 740  (w260,h80)  │
  │ W01      │  800 │  960 │   670  930 920 1000 (w260,h80)  │
  │ W02      │ 1300 │  960 │  1170 1430 920 1000 (w260,h80)  │
  └──────────┴──────┴──────┴──────────────────────────────────┘

  SAFE HORIZONTAL RAILS  (no node occupies these y values):
    y=170  between WAN(bot=128) and FW1(top=220)
    y=370  between FW1(bot=300) and DC1/DC2(top=420)
    y=560  between DC1/DC2(bot=500) and Row4(top=660)
    y=820  between Row4(bot=740) and W01/W02(top=920)
    y=1080 below W01/W02(bot=1000)

  SAFE VERTICAL GUTTERS  (no node in these x ranges at any y):
    x=30   far-left gutter
    x=2570 far-right gutter

  For parallel lines on same rail, offset y by 10px each.
  For parallel lines in same gutter, offset x by 12px each.
  ═══════════════════════════════════════════════════════════════
-->

<script>
// ── Layer toggles ──────────────────────────────────────────────
const activeLayers = new Set(['network','ad','mgmt','ansible','dhcp','rdp','dfs','profiles']);
document.querySelectorAll('.toggle-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const l = btn.dataset.layer;
    if (activeLayers.has(l)) { activeLayers.delete(l); btn.classList.remove('active'); }
    else                     { activeLayers.add(l);    btn.classList.add('active'); }
    applyVisibility();
  });
});

// ── Pan + zoom ─────────────────────────────────────────────────
const svg = document.getElementById('svg');
let vb=[0,0,2600,1200], drag=false, sx=0, sy=0;
const setVB = () => svg.setAttribute('viewBox', vb.join(' '));

svg.addEventListener('mousedown',  e => { drag=true; sx=e.clientX; sy=e.clientY; svg.classList.add('dragging'); });
window.addEventListener('mousemove', e => {
  if (!drag) return;
  vb[0]-=(e.clientX-sx)*vb[2]/svg.clientWidth;
  vb[1]-=(e.clientY-sy)*vb[3]/svg.clientHeight;
  sx=e.clientX; sy=e.clientY; setVB();
});
window.addEventListener('mouseup', () => { drag=false; svg.classList.remove('dragging'); });
svg.addEventListener('wheel', e => {
  e.preventDefault();
  const f=e.deltaY>0?1.1:0.9;
  vb[0]+=vb[2]*(e.offsetX/svg.clientWidth)*(1-f);
  vb[1]+=vb[3]*(e.offsetY/svg.clientHeight)*(1-f);
  vb[2]*=f; vb[3]*=f; setVB();
},{passive:false});
document.getElementById('zoomIn').onclick    = ()=>{ vb[0]+=vb[2]*.1;vb[1]+=vb[3]*.1;vb[2]*=.8;vb[3]*=.8;setVB(); };
document.getElementById('zoomOut').onclick   = ()=>{ vb[0]-=vb[2]*.125;vb[1]-=vb[3]*.125;vb[2]*=1.25;vb[3]*=1.25;setVB(); };
document.getElementById('zoomReset').onclick = ()=>{ vb=[0,0,2600,1200];setVB(); };

// ── Node isolation on click ────────────────────────────────────
let selectedNode = null;
const allEdges   = Array.from(document.querySelectorAll('.edge'));
const allElabels = Array.from(document.querySelectorAll('.elabel'));
const allNodes   = Array.from(document.querySelectorAll('.node-group[data-node-id]'));

function applyVisibility() {
  allEdges.forEach(el => {
    const layerOk = !el.dataset.layer || activeLayers.has(el.dataset.layer);
    if (!layerOk) { el.classList.add('hidden'); el.classList.remove('dimmed'); return; }
    el.classList.remove('hidden');
    if (selectedNode) {
      const nodes = (el.dataset.nodes || '').split(' ');
      el.classList.toggle('dimmed', !nodes.includes(selectedNode));
    } else {
      el.classList.remove('dimmed');
    }
  });
  // elabels: hide if layer off
  allElabels.forEach(el => {
    if (el.dataset.layer) el.classList.toggle('hidden', !activeLayers.has(el.dataset.layer));
  });
  // node dimming
  allNodes.forEach(n => {
    if (!selectedNode) { n.classList.remove('dimmed'); return; }
    const id = n.dataset.nodeId;
    // check if any visible edge connects to this node
    const connected = allEdges.some(e => {
      if (e.classList.contains('hidden')) return false;
      const ns = (e.dataset.nodes || '').split(' ');
      return ns.includes(id) && ns.includes(selectedNode);
    });
    n.classList.toggle('dimmed', id !== selectedNode && !connected);
  });
}

allNodes.forEach(node => {
  node.addEventListener('click', e => {
    e.stopPropagation();
    const id = node.dataset.nodeId;
    if (selectedNode === id) {
      selectedNode = null;       // deselect on second click
    } else {
      selectedNode = id;
    }
    applyVisibility();
  });
});
// Click on canvas background clears selection
svg.addEventListener('click', () => {
  if (selectedNode) { selectedNode = null; applyVisibility(); }
});

// ── Edge hover tooltip ─────────────────────────────────────────
const tip = document.getElementById('tip');
allEdges.forEach(edge => {
  const text = edge.dataset.tip;
  if (!text) return;
  // Use a wider invisible stroke for easier hover hit-testing
  edge.style.strokeWidth = '10';
  edge.style.strokeOpacity = '0';
  const clone = edge.cloneNode(false);
  clone.style.strokeWidth = '10';
  clone.style.strokeOpacity = '0';
  clone.style.fill = 'none';
  clone.classList.add('edge-hitbox');
  // insert invisible hitbox sibling
  edge.parentNode.insertBefore(clone, edge.nextSibling);

  function showTip(e) {
    tip.textContent = text;
    tip.style.display = 'block';
    moveTip(e);
  }
  function moveTip(e) {
    const x = e.clientX + 14, y = e.clientY + 14;
    tip.style.left = Math.min(x, window.innerWidth - tip.offsetWidth - 10) + 'px';
    tip.style.top  = Math.min(y, window.innerHeight - tip.offsetHeight - 10) + 'px';
  }
  function hideTip() { tip.style.display = 'none'; }

  [edge].forEach(el => {
    el.style.strokeWidth = '';
    el.style.strokeOpacity = '';
    el.addEventListener('mouseenter', showTip);
    el.addEventListener('mousemove',  moveTip);
    el.addEventListener('mouseleave', hideTip);
  });
});
// Invisible wider hitboxes on actual edge elements for easier targeting
allEdges.forEach(edge => {
  const hit = document.createElementNS('http://www.w3.org/2000/svg','polyline');
  hit.setAttribute('points', edge.getAttribute('points'));
  hit.setAttribute('fill','none');
  hit.setAttribute('stroke','transparent');
  hit.setAttribute('stroke-width','12');
  if (edge.dataset.tip) {
    const text = edge.dataset.tip;
    hit.addEventListener('mouseenter', e => { tip.textContent=text; tip.style.display='block'; moveTipGlobal(e); });
    hit.addEventListener('mousemove',  moveTipGlobal);
    hit.addEventListener('mouseleave', ()=>tip.style.display='none');
  }
  edge.parentNode.insertBefore(hit, edge.nextSibling);
});
function moveTipGlobal(e) {
  const x = e.clientX+14, y = e.clientY+14;
  tip.style.left = Math.min(x, window.innerWidth-tip.offsetWidth-10)+'px';
  tip.style.top  = Math.min(y, window.innerHeight-tip.offsetHeight-10)+'px';
}
</script>
</body>
